name: CI

on:
  push: { branches: [main] }
  pull_request:
  workflow_dispatch:

jobs:
  # The flight computer itself. No shell, no window, no hardware — that is C5, and it is why
  # this job is fast and runs everywhere.
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      # Includes purity.test.ts — the guard that fails the build if the computer ever imports
      # the shell it is supposed to be independent of.
      - name: Test
        run: bun test

  # The shell. Slow, platform-specific, and deliberately separate: if this breaks, the flight
  # computer above is still known-good.
  shell:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - uses: dtolnay/rust-toolchain@stable

      - name: Linux system deps (webkit2gtk et al.)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
                                  patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
                                  libgtk-3-dev libxdo-dev

      - uses: swatinem/rust-cache@v2
        with: { workspaces: './src-tauri -> target' }

      - run: bun install --frozen-lockfile
      - name: Build the app
        run: bun run tauri build --no-bundle
      # The shell's own tests: the TCP pump's newline contract, packet reassembly. The build
      # above already compiled the dependencies, so this is cheap.
      - name: Test the shell
        run: cargo test --manifest-path src-tauri/Cargo.toml
